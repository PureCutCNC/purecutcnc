name: Build Linux Desktop App

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to stamp (e.g. 0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Set version
        run: npm version "${{ inputs.version }}" --no-git-tag-version

      - name: Build Linux app
        run: npm run tauri build -- --bundles appimage,deb

      - name: Upload prerelease Linux bundles to release
        if: contains(inputs.version, '-')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          prerelease: true
          files: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
        continue-on-error: true

      - name: Upload stable Linux bundles to release
        if: ${{ !contains(inputs.version, '-') }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          files: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
        continue-on-error: true

      - name: Checkout pages repo
        uses: actions/checkout@v4
        with:
          repository: PureCutCNC/purecutcnc.github.io
          token: ${{ secrets.PAGES_DEPLOY_TOKEN }}
          path: pages-repo

      - name: Write Linux download metadata
        env:
          RELEASE_VERSION: ${{ inputs.version }}
          RELEASE_TAG: v${{ inputs.version }}
          RELEASE_CHANNEL: ${{ contains(inputs.version, '-') && 'snapshot' || 'stable' }}
        run: |
          node -e "
            const fs = require('fs');
            const path = require('path');
            const releaseTag = process.env.RELEASE_TAG;
            const channel = process.env.RELEASE_CHANNEL;
            const assets = [];
            const appendAssets = (dir, extension, label, kind) => {
              if (!fs.existsSync(dir)) return;
              for (const name of fs.readdirSync(dir).filter((file) => file.endsWith(extension)).sort()) {
                assets.push({
                  name,
                  label,
                  kind,
                  url: 'https://github.com/PureCutCNC/purecutcnc/releases/download/' + releaseTag + '/' + encodeURIComponent(name),
                });
              }
            };
            appendAssets('src-tauri/target/release/bundle/appimage', '.AppImage', 'Download AppImage', 'appimage');
            appendAssets('src-tauri/target/release/bundle/deb', '.deb', 'Download .deb package', 'deb');
            const outputDir = path.join('pages-repo', 'downloads', channel);
            fs.mkdirSync(outputDir, { recursive: true });
            const payload = {
              platform: 'linux',
              channel,
              version: process.env.RELEASE_VERSION,
              tag: releaseTag,
              releaseUrl: 'https://github.com/PureCutCNC/purecutcnc/releases/tag/' + releaseTag,
              updatedAt: new Date().toISOString(),
              assets,
            };
            fs.writeFileSync(path.join(outputDir, 'linux.json'), JSON.stringify(payload, null, 2) + '\n');
          "

      - name: Commit and push Linux download metadata
        run: |
          cd pages-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/
          git diff --cached --quiet || git commit -m "downloads: update Linux ${{ contains(inputs.version, '-') && 'snapshot' || 'stable' }} metadata for v${{ inputs.version }}"
          git push

      - name: Upload Linux bundles as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PureCutCNC-linux-bundles
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
