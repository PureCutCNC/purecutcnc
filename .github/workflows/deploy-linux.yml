name: Build Linux Desktop App

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to stamp (e.g. 0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Set version
        run: npm version "${{ inputs.version }}" --no-git-tag-version

      - name: Build Linux app
        run: npm run tauri build -- --bundles appimage,deb

      - name: Upload prerelease Linux bundles to release
        if: contains(inputs.version, '-')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          prerelease: true
          files: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
        continue-on-error: true

      - name: Upload stable Linux bundles to release
        if: ${{ !contains(inputs.version, '-') }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          files: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
        continue-on-error: true

      - name: Upload Linux bundles as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PureCutCNC-linux-bundles
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
