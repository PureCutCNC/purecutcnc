name: Build and Deploy RC

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy-rc:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout app source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Checkout pages repo
        uses: actions/checkout@v4
        with:
          repository: PureCutCNC/purecutcnc.github.io
          token: ${{ secrets.PAGES_DEPLOY_TOKEN }}
          path: pages-repo

      - name: Copy build output to app-rc folder
        run: |
          rm -rf pages-repo/app-rc
          mkdir -p pages-repo/app-rc
          cp -r dist/. pages-repo/app-rc/

      - name: Commit and push
        run: |
          cd pages-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app-rc/
          git diff --cached --quiet || git commit -m "deploy-rc: update from ${{ github.repository }}@${{ github.sha }}"
          git push
