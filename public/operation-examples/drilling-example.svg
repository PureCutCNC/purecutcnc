<svg viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="drillGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4338ca;stop-opacity:1" />
    </radialGradient>
  </defs>
  <!-- Stock -->
  <rect x="30" y="30" width="240" height="140" fill="none" stroke="#8899aa" stroke-width="2"/>
  <!-- Drilled holes -->
  <circle cx="80" cy="100" r="8" fill="url(#drillGrad)" opacity="0.7"/>
  <circle cx="150" cy="80" r="8" fill="url(#drillGrad)" opacity="0.7"/>
  <circle cx="220" cy="100" r="8" fill="url(#drillGrad)" opacity="0.7"/>
  <circle cx="150" cy="140" r="8" fill="url(#drillGrad)" opacity="0.7"/>
  <!-- Drill bit -->
  <path d="M 150 45 L 145 55 L 155 55 Z" fill="#daa520" stroke="#b8860b" stroke-width="1.5"/>
  <line x1="150" y1="55" x2="150" y2="72" stroke="#daa520" stroke-width="2"/>
  <!-- Depth marker -->
  <line x1="170" y1="80" x2="200" y2="80" stroke="#8899aa" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="205" y="85" font-size="10" fill="#8899aa">Depth</text>
  <!-- Label -->
  <text x="150" y="190" text-anchor="middle" font-size="14" fill="#c8ddf0" font-weight="600">Drilling</text>
</svg>
