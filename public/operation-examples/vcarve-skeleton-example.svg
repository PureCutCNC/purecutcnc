<svg viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="skeletonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7ec850;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5a9d3d;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Stock -->
  <rect x="30" y="30" width="240" height="140" fill="none" stroke="#8899aa" stroke-width="2"/>
  <!-- Shape outline -->
  <path d="M 80 80 L 150 120 L 220 80 L 220 140 L 80 140 Z" fill="none" stroke="#8899aa" stroke-width="2"/>
  <!-- Skeleton (medial axis) -->
  <path d="M 150 100 L 150 135 M 115 110 L 150 100 M 185 110 L 150 100" stroke="url(#skeletonGrad)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- V-grooves along skeleton -->
  <path d="M 140 100 L 150 125 L 160 100" stroke="#7ec850" stroke-width="1.5" fill="none" opacity="0.6"/>
  <!-- Tool -->
  <path d="M 150 55 L 145 65 L 155 65 Z" fill="#daa520" stroke="#b8860b" stroke-width="1.5"/>
  <!-- Label -->
  <text x="150" y="190" text-anchor="middle" font-size="14" fill="#c8ddf0" font-weight="600">V-Carve Skeleton</text>
</svg>
