<svg viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="roughGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Stock -->
  <rect x="30" y="30" width="240" height="140" fill="none" stroke="#8899aa" stroke-width="2"/>
  <!-- 3D Model outline (simplified) -->
  <path d="M 100 70 L 150 50 L 200 70 L 200 140 L 100 140 Z" fill="none" stroke="#8899aa" stroke-width="2"/>
  <!-- Rough cutting passes -->
  <path d="M 110 90 L 190 90 M 110 105 L 190 105 M 110 120 L 190 120 M 110 135 L 190 135" stroke="url(#roughGrad)" stroke-width="2.5" opacity="0.8" stroke-linecap="round"/>
  <!-- Ball endmill -->
  <circle cx="110" cy="90" r="8" fill="#daa520" stroke="#b8860b" stroke-width="1.5"/>
  <!-- Stepdown indicator -->
  <g stroke="#8899aa" stroke-width="1" fill="none">
    <line x1="65" y1="90" x2="75" y2="90"/>
    <line x1="70" y1="85" x2="70" y2="95"/>
    <line x1="65" y1="105" x2="75" y2="105"/>
    <line x1="70" y1="100" x2="70" y2="110"/>
  </g>
  <text x="50" y="100" font-size="10" fill="#8899aa">Steps</text>
  <!-- Label -->
  <text x="150" y="190" text-anchor="middle" font-size="14" fill="#c8ddf0" font-weight="600">3D Surface Rough</text>
</svg>
