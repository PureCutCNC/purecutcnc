<svg viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cleanupGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Stock -->
  <rect x="30" y="30" width="240" height="140" fill="none" stroke="#8899aa" stroke-width="2"/>
  <!-- 3D Model outline -->
  <path d="M 100 70 L 150 50 L 200 70 L 200 140 L 100 140 Z" fill="none" stroke="#8899aa" stroke-width="2"/>
  <!-- Surface with remaining peaks -->
  <path d="M 110 80 L 115 75 L 120 80 L 125 75 L 130 80 L 135 75 L 140 80" stroke="#8899aa" stroke-width="1" fill="none" opacity="0.6"/>
  <!-- Cleanup passes at peaks -->
  <circle cx="115" cy="75" r="5" fill="url(#cleanupGrad)" opacity="0.6"/>
  <circle cx="125" cy="75" r="5" fill="url(#cleanupGrad)" opacity="0.6"/>
  <circle cx="135" cy="75" r="5" fill="url(#cleanupGrad)" opacity="0.6"/>
  <!-- Additional cleanup points -->
  <path d="M 120 100 L 135 100" stroke="url(#cleanupGrad)" stroke-width="2" opacity="0.7" stroke-linecap="round"/>
  <path d="M 160 110 L 180 110" stroke="url(#cleanupGrad)" stroke-width="2" opacity="0.7" stroke-linecap="round"/>
  <!-- Tool -->
  <circle cx="116" cy="75" r="6" fill="#daa520" stroke="#b8860b" stroke-width="1.5"/>
  <!-- Label -->
  <text x="150" y="190" text-anchor="middle" font-size="14" fill="#c8ddf0" font-weight="600">3D Surface Cleanup</text>
</svg>
